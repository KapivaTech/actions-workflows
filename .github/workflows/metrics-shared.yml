name: Claude Code Metrics (Shared)

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook for posting metrics'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          cat > collect_metrics.sh << 'EOFSCRIPT'
          #!/bin/bash
          set -e
          
          OUTPUT_FILE="metrics_$(date +%Y-%m-%d).json"
          
          CO_AUTHORED=$(git log --all --since="7 days ago" --format='%B' | grep -c "Co-authored-by: Claude" || echo "0")
          TOTAL=$(git log --all --since="7 days ago" --oneline | wc -l)
          
          if [ "$TOTAL" -eq 0 ]; then
            PERCENT="0"
          else
            PERCENT=$(echo "scale=2; ($CO_AUTHORED * 100) / $TOTAL" | bc 2>/dev/null || echo "0")
          fi
          
          AUTONOMOUS_PRS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/pulls?state=closed&labels=ai:autonomous&sort=updated&per_page=100" \
            | grep -c '"merged_at"' || echo "0")
          
          TTC_DAYS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/pulls?state=closed&sort=updated&direction=desc&per_page=20" \
            | jq -r '.[] | select(.merged_at != null) | (((.merged_at | fromdateiso8601) - (.created_at | fromdateiso8601)) / 86400)' \
            | awk '{sum+=$1; count++} END {if (count > 0) printf "%.1f", sum/count; else print "0"}')
          
          ENGINEERS="["
          first=true
          git log --all --since="7 days ago" --format='%an' | sort -u | while read author; do
            if [ ! -z "$author" ] && [ "$author" != "dependabot[bot]" ] && [ "$author" != "github-actions[bot]" ]; then
              author_total=$(git log --all --since="7 days ago" --author="$author" --oneline | wc -l)
              author_coauth=$(git log --all --since="7 days ago" --author="$author" --format='%B' | grep -c "Co-authored-by: Claude" || echo "0")
              
              if [ "$author_total" -gt "0" ]; then
                author_pct=$(echo "scale=1; ($author_coauth * 100) / $author_total" | bc 2>/dev/null || echo "0")
                
                if [ "$first" = false ]; then
                  ENGINEERS="$ENGINEERS,"
                fi
                first=false
                
                ENGINEERS="$ENGINEERS{\"name\":\"$author\",\"total_commits\":$author_total,\"co_authored_commits\":$author_coauth,\"co_authored_percent\":$author_pct}"
              fi
            fi
          done
          ENGINEERS="$ENGINEERS]"
          
          cat > "$OUTPUT_FILE" << EOJSON
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repository": "$REPO_OWNER/$REPO_NAME",
            "week_of": "$(date -d '7 days ago' +%Y-%m-%d) to $(date +%Y-%m-%d)",
            "metrics": {
              "co_authored_count": $CO_AUTHORED,
              "total_commits": $TOTAL,
              "co_authored_percent": $PERCENT,
              "autonomous_prs_merged": $AUTONOMOUS_PRS,
              "avg_time_to_completion_days": $TTC_DAYS
            },
            "engineers": $ENGINEERS
          }
          EOJSON
          
          echo "Metrics saved to $OUTPUT_FILE"
          EOFSCRIPT
          
          bash collect_metrics.sh
      
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4.3.5
        with:
          name: metrics-report
          path: metrics_*.json
          retention-days: 90
      
      - name: Post to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'EOFPYTHON'
          import json
          import os
          import requests
          from datetime import datetime
          from pathlib import Path
          
          metrics_files = sorted(Path('.').glob('metrics_*.json'), reverse=True)
          if not metrics_files:
            print("No metrics file found")
            exit(1)
          
          with open(metrics_files[0]) as f:
            metrics = json.load(f)
          
          webhook_url = os.getenv('SLACK_WEBHOOK_URL')
          if not webhook_url:
            print("SLACK_WEBHOOK_URL not set")
            exit(1)
          
          coauth = float(metrics['metrics']['co_authored_percent'])
          if coauth >= 20:
            color = "good"
            status = "🎯 Excellent"
          elif coauth >= 10:
            color = "warning"
            status = "📈 Good"
          else:
            color = "danger"
            status = "⚠️ Ramping"
          
          engineers = sorted(
            metrics.get('engineers', []),
            key=lambda x: float(x.get('co_authored_percent', 0)),
            reverse=True
          )[:5]
          
          engineer_text = "\n".join([
            f"• {e['name']}: {e['co_authored_commits']}/{e['total_commits']} ({e['co_authored_percent']}%)"
            for e in engineers
          ])
          
          m = metrics['metrics']
          repo = metrics.get('repository', 'repo')
          
          payload = {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "📊 Claude Code Metrics",
                  "emoji": True
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": f"*{repo}*\nWeek of {metrics['week_of']}\n{status}"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": f"*Co-authored*\n{m['co_authored_percent']}% ({m['co_authored_count']}/{m['total_commits']})"
                  },
                  {
                    "type": "mrkdwn",
                    "text": f"*Autonomous PRs*\n{m['autonomous_prs_merged']} merged"
                  },
                  {
                    "type": "mrkdwn",
                    "text": f"*Avg TTC*\n{m['avg_time_to_completion_days']} days"
                  },
                  {
                    "type": "mrkdwn",
                    "text": f"*Engineers*\n{len(engineers)}"
                  }
                ]
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": f"*Top Contributors*\n{engineer_text}" if engineer_text else "*Top Contributors*\nNo data yet"
                }
              }
            ],
            "attachments": [
              {
                "color": color,
                "text": f"Updated: {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}"
              }
            ]
          }
          
          headers = {'Content-Type': 'application/json'}
          try:
            response = requests.post(webhook_url, json=payload, headers=headers, timeout=10)
            response.raise_for_status()
            print("✅ Posted to Slack")
          except Exception as e:
            print(f"⚠️ Error posting to Slack: {e}")
            exit(0)
          
          EOFPYTHON
