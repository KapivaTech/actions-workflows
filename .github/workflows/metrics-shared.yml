name: Claude Code Metrics (Shared)

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install requests
      
      - name: Collect and post metrics
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python3 << 'EOFPYTHON'
          import json, os, subprocess, requests
          from datetime import datetime, timedelta
          from collections import defaultdict
  
          webhook = os.getenv('SLACK_WEBHOOK_URL')
          owner = os.getenv('REPO_OWNER')
          repo = os.getenv('REPO_NAME')
  
          # Get all commits in last 7 days with details
          result = subprocess.run(
              ['git', 'log', '--since=7 days ago', '--format=%an|||%ae|||%H|||%B|||%ai'],
              capture_output=True, text=True
          )
  
          engineers = defaultdict(lambda: {
              'email': '',
              'total_commits': 0,
              'co_authored_commits': 0,
              'co_authored_prs': 0,
              'avg_ttc': 0,
              'commits': [],
              'dates': []
          })
  
          all_commits = result.stdout.strip().split('\n')
  
          for commit in all_commits:
              if '|||' not in commit:
                  continue
              parts = commit.split('|||')
              if len(parts) < 5:
                  continue
              
              author, email, commit_hash, message, date = parts[0], parts[1], parts[2], parts[3], parts[4]
              author = author.strip()
              
              if not author or author in ['dependabot[bot]', 'github-actions[bot]']:
                  continue
              
              is_co_authored = 'Co-authored-by: Claude' in message
              
              engineers[author]['email'] = email
              engineers[author]['total_commits'] += 1
              engineers[author]['commits'].append(commit_hash)
              engineers[author]['dates'].append(date)
              
              if is_co_authored:
                  engineers[author]['co_authored_commits'] += 1
  
          # Get PRs data
          pr_result = subprocess.run(
              ['git', 'log', '--since=7 days ago', '--format=%an|||%s', '--all'],
              capture_output=True, text=True
          )
  
          prs_by_author = defaultdict(int)
          for line in pr_result.stdout.strip().split('\n'):
              if '|||' not in line:
                  continue
              author, subject = line.split('|||', 1)
              author = author.strip()
              if 'Merge pull request' in subject or 'merge pull request' in subject.lower():
                  prs_by_author[author] += 1
  
          # Calculate stats
          week_of = f"{(datetime.now() - timedelta(days=7)).strftime('%Y-%m-%d')} to {datetime.now().strftime('%Y-%m-%d')}"
  
          # Sort engineers by co-authored commits
          sorted_engineers = sorted(
              engineers.items(),
              key=lambda x: x[1]['co_authored_commits'],
              reverse=True
          )
  
          # Build detailed report blocks
          blocks = [
              {'type': 'header', 'text': {'type': 'plain_text', 'text': '📊 Claude Code Metrics Report'}},
              {'type': 'section', 'text': {'type': 'mrkdwn', 'text': f'*{owner}/{repo}*\nWeek of {week_of}'}},
              {'type': 'divider'}
          ]
  
          # Add each engineer as a detailed section
          for author, stats in sorted_engineers:
              if stats['total_commits'] == 0:
                  continue
              
              co_auth_pct = round((stats['co_authored_commits'] * 100) / stats['total_commits'], 1)
              prs = prs_by_author.get(author, 0)
              
              # Status emoji
              if co_auth_pct >= 80:
                  adoption = '🔥 Expert'
              elif co_auth_pct >= 60:
                  adoption = '⭐ Advanced'
              elif co_auth_pct >= 40:
                  adoption = '📈 Proficient'
              elif co_auth_pct >= 20:
                  adoption = '🌱 Learning'
              else:
                  adoption = '👋 New'
              
              engineer_text = f"""*{author}*
          Email: {stats['email']}
          Adoption Level: {adoption}
  
          *Metrics:*
          • Total Commits: {stats['total_commits']}
          • Claude Co-authored: {stats['co_authored_commits']}/{stats['total_commits']} ({co_auth_pct}%)
          • PRs Merged: {prs}
          • Avg Commits/Day: {round(stats['total_commits'] / 7, 1)}"""
              
              blocks.append({
                  'type': 'section',
                  'text': {'type': 'mrkdwn', 'text': engineer_text}
              })
              blocks.append({'type': 'divider'})
  
          # Team summary
          total_commits = sum(s['total_commits'] for s in engineers.values())
          total_co_authored = sum(s['co_authored_commits'] for s in engineers.values())
          total_engineers = len([s for s in engineers.values() if s['total_commits'] > 0])
          overall_pct = round((total_co_authored*100/total_commits) if total_commits > 0 else 0, 1)
  
          color = 'good' if overall_pct >= 20 else 'warning' if overall_pct >= 10 else 'danger'
          status = '🎯 Excellent' if overall_pct >= 20 else '📈 Good' if overall_pct >= 10 else '⚠️ Ramping'
  
          blocks.insert(2, {
              'type': 'section',
              'fields': [
                  {'type': 'mrkdwn', 'text': f'*Team Status*\n{status}'},
                  {'type': 'mrkdwn', 'text': f'*Overall Adoption*\n{overall_pct}%'},
                  {'type': 'mrkdwn', 'text': f'*Total Commits*\n{total_commits}'},
                  {'type': 'mrkdwn', 'text': f'*Active Engineers*\n{total_engineers}'}
              ]
          })
          blocks.insert(3, {'type': 'divider'})
  
          msg = {
              'blocks': blocks,
              'attachments': [{'color': color, 'text': f'Updated: {datetime.now().strftime("%Y-%m-%d %H:%M UTC")}'}]
          }
  
          r = requests.post(webhook, json=msg)
          print(f'✓ Posted detailed report for {total_engineers} engineers')
          print(f'✓ Team adoption: {overall_pct}% ({total_co_authored}/{total_commits})')
          EOFPYTHON
