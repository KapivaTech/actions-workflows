name: Claude Code Metrics (Shared)

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install requests
      
      - name: Collect and post metrics
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python3 -c "
          import json, os, subprocess, requests
          from datetime import datetime, timedelta
          
          webhook = os.getenv('SLACK_WEBHOOK_URL')
          owner = os.getenv('REPO_OWNER')
          repo = os.getenv('REPO_NAME')
          
          # Count commits
          co = subprocess.run(['git', 'log', '--since=7 days ago', '--grep=Co-authored-by: Claude', '--oneline'], capture_output=True, text=True).stdout.count('\n')
          total = subprocess.run(['git', 'log', '--since=7 days ago', '--oneline'], capture_output=True, text=True).stdout.count('\n')
          pct = round((co*100/total) if total > 0 else 0, 1)
          
          color = 'good' if pct >= 20 else 'warning' if pct >= 10 else 'danger'
          status = '🎯 Excellent' if pct >= 20 else '📈 Good' if pct >= 10 else '⚠️ Ramping'
          
          msg = {
            'blocks': [
              {'type': 'header', 'text': {'type': 'plain_text', 'text': '📊 Claude Metrics'}},
              {'type': 'section', 'text': {'type': 'mrkdwn', 'text': f'*{owner}/{repo}*\n{status}'}},
              {'type': 'divider'},
              {'type': 'section', 'fields': [
                {'type': 'mrkdwn', 'text': f'*Co-authored*\n{pct}% ({co}/{total})'},
                {'type': 'mrkdwn', 'text': f'*Updated*\n{datetime.now().strftime(\"%Y-%m-%d %H:%M UTC\")}'}
              ]}
            ],
            'attachments': [{'color': color}]
          }
          
          r = requests.post(webhook, json=msg)
          print(f'✓ Posted: {pct}% ({co}/{total})')
          "
